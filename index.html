<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簡報進度追蹤系統</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+TC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2744;--navy2:#1a3a5c;--navy3:#2563a8;
  --green:#059669;--gbg:#d1fae5;--gtxt:#065f46;
  --blue:#2563eb;--bbg:#dbeafe;--btxt:#1e40af;
  --amber:#d97706;--abg:#fef3c7;--atxt:#92400e;
  --red:#dc2626;--rbg:#fee2e2;--rtxt:#991b1b;
  --purple:#7c3aed;--pbg:#ede9fe;--ptxt:#4c1d95;
  --gray:#64748b;--gbg2:#f1f5f9;--gtxt2:#334155;
  --border:#e2e8f0;--surf:#f8fafc;
  --text:#0f172a;--text2:#475569;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --shlg:0 8px 40px rgba(15,39,68,.18);
  --r:12px;
}
body{font-family:'IBM Plex Sans TC',sans-serif;background:var(--gbg2);color:var(--text);font-size:14px;min-height:100vh}
#loading{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:14px;z-index:300;transition:opacity .4s}
.spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(15,39,68,.5);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .18s;padding:16px;overflow-y:auto}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal{background:#fff;border-radius:20px;padding:32px 28px;width:520px;max-width:100%;box-shadow:var(--shlg);animation:slideUp .2s;max-height:92vh;overflow-y:auto}
.modal-icon{font-size:22px;margin-bottom:10px}
.modal h2{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:4px}
.modal p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.modal a{color:var(--navy3)}
.field{margin-bottom:11px}
.lbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:4px}
.inp{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s;background:#fff}
.inp:focus{border-color:var(--navy3)}
textarea.inp{resize:vertical;min-height:76px}
select.inp{cursor:pointer}
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;margin:8px 0}
.check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--navy);cursor:pointer}
.check-row span{font-size:13px;color:var(--text2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 18px;border-radius:9px;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.86}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;width:100%;padding:11px;font-size:14px}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy3);opacity:1}
.btn-ghost{background:var(--gbg2);color:var(--text2)}
.btn-danger{background:var(--rbg);color:var(--rtxt)}
.btn-amber{background:var(--abg);color:var(--atxt)}
.btn-purple{background:var(--pbg);color:var(--ptxt)}
.btn-sm{padding:4px 11px;font-size:12px}
.btn-icon{padding:5px 8px;font-size:13px;border-radius:7px}
/* RAG */
.rag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:700}
.rag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rag-green{background:#d1fae5;color:#065f46}.rag-green .rag-dot{background:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.2)}
.rag-amber{background:#fef3c7;color:#92400e}.rag-amber .rag-dot{background:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.2)}
.rag-red{background:#fee2e2;color:#991b1b}.rag-red .rag-dot{background:#ef4444;box-shadow:0 0 0 2px rgba(239,68,68,.2)}
.rag-gray{background:#f1f5f9;color:#475569}.rag-gray .rag-dot{background:#94a3b8}
/* header */
.header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff}
.hdr{max-width:1060px;margin:0 auto;padding:18px 24px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding-bottom:12px}
.hdr-title{font-size:17px;font-weight:700}.hdr-sub{font-size:12px;opacity:.7;margin-top:3px}
.stat-pct{font-size:26px;font-weight:700;font-family:'IBM Plex Mono';line-height:1}
.stat-lbl{font-size:11px;opacity:.65;margin-top:2px;text-align:right}
.prog-wrap{background:rgba(255,255,255,.15);border-radius:100px;height:5px;overflow:hidden;margin-bottom:12px}
.prog-fill{height:5px;background:linear-gradient(90deg,#34d399,#10b981);border-radius:100px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.sync-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border-radius:100px;padding:3px 10px;font-size:11px;margin-bottom:10px}
.sdot{width:6px;height:6px;background:#34d399;border-radius:50%;animation:pulse 2s infinite}
.sdot.err{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);transition:all .15s}
.nav-tab.active{background:#fff;color:var(--navy)}
/* content */
.content{max-width:1060px;margin:0 auto;padding:20px 24px}
.sum-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sum-card{background:#fff;border-radius:var(--r);padding:12px 15px;box-shadow:var(--sh);border-top:3px solid transparent}
.sum-num{font-size:21px;font-weight:700;font-family:'IBM Plex Mono'}.sum-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.rag-legend{display:flex;gap:10px;align-items:center;background:#fff;border-radius:9px;padding:8px 14px;box-shadow:var(--sh);margin-bottom:12px;flex-wrap:wrap}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.tl,.tr{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fbtn{padding:5px 12px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;color:var(--text2)}
.fbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.srch{padding:6px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;outline:none;width:160px;color:var(--text);transition:border-color .15s}
.srch:focus{border-color:var(--navy3)}
/* task cards */
.tasks-list{display:flex;flex-direction:column;gap:10px}
.task-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1.5px solid transparent;transition:box-shadow .15s,opacity .15s}
.task-card:hover{box-shadow:0 4px 20px rgba(15,39,68,.1)}
.task-card.overdue{border-color:#fca5a5}
.task-card.dragging{opacity:.35;box-shadow:none}
.task-card.drag-over{box-shadow:0 0 0 2px var(--navy3),0 4px 20px rgba(37,99,168,.18)}
.task-head{padding:14px 16px 14px 4px;cursor:pointer;user-select:none;display:flex;align-items:flex-start}
.drag-handle{width:26px;display:flex;align-items:center;justify-content:center;cursor:grab;color:#cbd5e1;font-size:13px;flex-shrink:0;user-select:none}
.drag-handle:hover{color:var(--gray)}.drag-handle:active{cursor:grabbing}
.th-inner{flex:1;min-width:0}
.th-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.th-left{flex:1;min-width:0}
.ttl{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.5}
.tmeta{display:flex;gap:12px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tm{font-size:12px;color:var(--text2)}.tm.red{color:var(--red)}
.th-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.exp-icon{font-size:10px;color:var(--text2);transition:transform .2s}
.exp-icon.open{transform:rotate(180deg)}
.mbar{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.mpill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:500;border:1.5px solid transparent}
.mp-done{background:var(--gbg);color:var(--gtxt);border-color:#a7f3d0}
.mp-prog{background:var(--bbg);color:var(--btxt);border-color:#bfdbfe}
.mp-review{background:var(--abg);color:var(--atxt);border-color:#fde68a}
.mp-late{background:var(--rbg);color:var(--rtxt);border-color:#fecdd3}
.mp-none{background:var(--gbg2);color:var(--gray);border-color:var(--border)}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* task body member rows */
.task-body{border-top:1px solid var(--gbg2);overflow:hidden;border-radius:0 0 var(--r) var(--r)}
.mr{display:flex;align-items:stretch;border-bottom:1px solid var(--gbg2)}
.mr:last-child{border-bottom:none}
.mr-l{width:185px;flex-shrink:0;padding:11px 15px;border-right:1px solid var(--gbg2);display:flex;flex-direction:column;gap:4px}
.mr-name{font-size:13px;font-weight:600}
.mr-m{flex:1;padding:11px 15px;min-width:0}
.mr-r{padding:11px 11px;display:flex;align-items:flex-start;flex-shrink:0}
.log-list{display:flex;flex-direction:column;gap:5px}
.log-e{background:var(--surf);border-left:3px solid var(--border);border-radius:0 6px 6px 0;padding:7px 10px;font-size:12px;color:var(--text2);line-height:1.5}
.log-e .lm{font-size:10px;color:var(--gray);margin-bottom:2px}
.log-e.latest{border-left-color:var(--navy3)}
.no-log{font-size:12px;color:#94a3b8;font-style:italic;padding:4px 0}
.ied{background:var(--surf);border-top:1px solid var(--border);padding:13px 17px;animation:slideUp .15s}
.ied-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ied-f{margin-top:9px}.ied-a{display:flex;gap:7px;margin-top:10px}
/* period sections for recurring */
.period-head{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surf);border-bottom:1px solid var(--gbg2);flex-wrap:wrap}
.period-head.current{background:#eff6ff;border-left:3px solid var(--navy3)}
.period-num{font-size:12px;font-weight:700;color:var(--navy)}
.period-dl{font-size:12px;color:var(--text2)}
.history-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;font-size:12px;color:var(--navy3);cursor:pointer;background:var(--surf);border-top:1px solid var(--gbg2);border:none;width:100%;text-align:left;font-family:inherit;font-weight:600;transition:background .15s}
.history-btn:hover{background:#eff6ff}
.hist-period{border-top:1px solid var(--gbg2)}
.hist-period-head{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#fafafa;cursor:pointer;user-select:none;border-bottom:1px solid var(--gbg2)}
.hist-period-head:hover{background:var(--surf)}
/* add/edit form */
.task-form{background:#fff;border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh);border:1.5px solid var(--navy3);animation:slideUp .2s}
.task-form h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}
.rec-box{background:var(--surf);border:1.5px solid var(--bbg);border-radius:10px;padding:14px;margin-top:4px}
.rec-box-title{font-size:12px;font-weight:700;color:var(--btxt);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dow-picker{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.dow-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text2);font-family:inherit}
.dow-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;min-height:28px;align-items:center}
.mtag{display:inline-flex;align-items:center;gap:5px;background:var(--bbg);color:var(--btxt);border-radius:100px;padding:3px 11px;font-size:12px;font-weight:500}
.mtag button{background:none;border:none;cursor:pointer;color:var(--btxt);font-size:14px;line-height:1;padding:0;opacity:.6}
.mtag button:hover{opacity:1}
.madd{display:flex;gap:7px;margin-top:7px}.madd .inp{flex:1}
.form-actions{display:flex;gap:7px;margin-top:12px}
/* badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.bg-g{background:var(--gbg);color:var(--gtxt)}.bg-b{background:var(--bbg);color:var(--btxt)}
.bg-a{background:var(--abg);color:var(--atxt)}.bg-r{background:var(--rbg);color:var(--rtxt)}
.bg-gr{background:var(--gbg2);color:var(--gtxt2)}.bg-p{background:var(--pbg);color:var(--ptxt)}
/* calendar */
.cal-wrap{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.cal-header{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-title{font-size:15px;font-weight:700;color:var(--navy);min-width:160px;text-align:center}
.cal-vt{display:flex;gap:4px}
.cvt{padding:4px 12px;border-radius:7px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--text2);transition:all .15s}
.cvt.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.cal-body{padding:14px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow-lbl{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{min-height:82px;border-radius:8px;padding:5px 6px;border:1.5px solid transparent;cursor:pointer;transition:background .15s}
.cal-cell:hover{background:var(--surf)}.cal-cell.today{border-color:var(--navy3);background:#eff6ff}
.cal-cell.other-month .cal-day{opacity:.3}.cal-cell.other-month .cal-events{opacity:.4}
.cal-day{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.today-num{background:var(--navy);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.cal-events{display:flex;flex-direction:column;gap:2px}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;display:flex;align-items:center;gap:3px}
.cal-ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-more{font-size:10px;color:var(--gray);margin-top:1px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-col{border-radius:10px;border:1.5px solid var(--border);overflow:hidden}
.week-col.today{border-color:var(--navy3)}
.week-col-head{padding:7px 9px;text-align:center;border-bottom:1px solid var(--border);background:var(--surf)}
.week-dow{font-size:11px;color:var(--text2);font-weight:600}.week-day{font-size:17px;font-weight:700;color:var(--navy)}
.week-col.today .week-day{color:var(--blue)}
.week-col-body{padding:7px;display:flex;flex-direction:column;gap:4px;min-height:110px}
.week-ev{font-size:11px;padding:4px 7px;border-radius:6px;font-weight:500;display:flex;align-items:center;gap:4px}
.week-ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.yr-month{border-radius:10px;border:1.5px solid var(--border);overflow:hidden}
.yr-month-head{padding:6px 10px;background:var(--gbg2);font-size:12px;font-weight:700;color:var(--navy);text-align:center;border-bottom:1px solid var(--border)}
.yr-dow{display:grid;grid-template-columns:repeat(7,1fr)}
.yr-dow-lbl{text-align:center;font-size:9px;color:var(--text2);padding:2px 0}
.yr-grid-inner{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:3px}
.yr-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:3px;cursor:pointer;transition:background .1s;color:var(--text2);position:relative}
.yr-cell:hover{background:var(--gbg2)}.yr-cell.today{background:var(--navy);color:#fff;font-weight:700}
.yr-cell.has-tasks::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--amber)}
.yr-cell.other-m{opacity:.2}
.day-popup{position:fixed;inset:0;background:rgba(15,39,68,.45);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.day-popup-inner{background:#fff;border-radius:16px;padding:22px;width:420px;max-width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shlg);animation:slideUp .2s}
.day-task-item{border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.day-task-m{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2);padding:3px 0}
/* users */
.user-panel{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px 22px}
.user-panel h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px}
.user-search-row{display:flex;gap:10px;margin-bottom:16px}
.user-search-row .inp{flex:1}
.user-stat-card{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.usc-head{background:var(--gbg2);padding:11px 15px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.usc-name{font-size:14px;font-weight:700}
.usc-body{padding:11px 15px;display:flex;flex-direction:column;gap:6px}
.usc-task{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:6px 10px;background:var(--surf);border-radius:8px;gap:8px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--navy);color:#fff;padding:8px 20px;border-radius:100px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none;z-index:400;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:700px){
  .sum-strip{grid-template-columns:repeat(2,1fr)}
  .mr-l{width:120px;padding:10px}
  .form-2,.form-3{grid-template-columns:1fr}
  .ied-g{grid-template-columns:1fr}
  .year-grid{grid-template-columns:repeat(2,1fr)}
  .week-grid{grid-template-columns:repeat(4,1fr)}
  .rag-legend{display:none}
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div style="font-size:13px;opacity:.65">載入中…</div></div>
<div id="toast"></div>
<div id="app" style="display:none"></div>
<script>
/* ══ CONFIG ══ */
const GIST_ID='8a2ffecb915c95aae1019c8af1d8b929',GIST_FILE='data.json',TOKEN_KEY='ppt_gh_token',SYNC_MS=5000;

/* ══ RAG ══ */
function getDeadlineDT(task,period){
  if(task.isRecurring){
    const p=period||getCurrentPeriod(task);
    return p?new Date(p.deadline):null;
  }
  if(!task.deadline)return null;
  const t=task.deadlineTime||'23:59';
  return new Date(`${task.deadline}T${t}:00`);
}
function getCurrentPeriod(task){
  if(!task.periods?.length)return null;
  const now=new Date();
  return task.periods.find(p=>new Date(p.deadline)>=now)||task.periods[task.periods.length-1];
}
function getSubs(task,period){
  if(task.isRecurring){const p=period||getCurrentPeriod(task);return p?.submissions||{};}
  return task.submissions||{};
}
function calcRag(task,period){
  const subs=getSubs(task,period);
  const mem=task.members||[];
  if(mem.every(m=>subs[m]?.status==='completed'))return'green';
  const now=new Date();
  const dl=getDeadlineDT(task,period);
  if(dl&&dl<now)return'red';
  if(mem.some(m=>subs[m]?.status==='delayed'))return'red';
  const soon=dl&&(dl-now)<3*86400000;
  const halfNone=mem.filter(m=>!subs[m]||subs[m].status==='not_started').length>mem.length/2;
  if(soon||halfNone)return'amber';
  if(mem.some(m=>subs[m]&&subs[m].status!=='not_started'))return'green';
  return'gray';
}
function ragBadge(task,period){
  const r=calcRag(task,period);
  const m={green:{cls:'rag-green',dot:'#059669',lbl:'進度正常'},amber:{cls:'rag-amber',dot:'#f59e0b',lbl:'需注意'},red:{cls:'rag-red',dot:'#ef4444',lbl:'風險'},gray:{cls:'rag-gray',dot:'#94a3b8',lbl:'未開始'}}[r];
  return`<span class="rag ${m.cls}"><span class="rag-dot" style="background:${m.dot}"></span>${m.lbl}</span>`;
}
function ragColor(task,period){
  const r=calcRag(task,period);
  return{green:{dot:'#059669',bg:'#d1fae5',txt:'#065f46'},amber:{dot:'#f59e0b',bg:'#fef3c7',txt:'#92400e'},red:{dot:'#ef4444',bg:'#fee2e2',txt:'#991b1b'},gray:{dot:'#94a3b8',bg:'#f1f5f9',txt:'#475569'}}[r];
}

/* ══ RECURRENCE ENGINE ══ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

function getRecDates(rec,startDate,maxDate){
  const dates=[];const end=maxDate;
  if(rec.type==='daily'){
    let d=new Date(startDate);
    while(d<=end){dates.push(dStr2(d));d.setDate(d.getDate()+1);}
  } else if(rec.type==='weekly'||rec.type==='biweekly'){
    const step=rec.type==='weekly'?7:14;
    const days=rec.daysOfWeek?.length?rec.daysOfWeek:[5];
    for(const dow of days){
      let d=new Date(startDate);
      while(d.getDay()!==dow)d.setDate(d.getDate()+1);
      while(d<=end){dates.push(dStr2(d));d=new Date(d.getTime()+step*86400000);}
    }
  } else if(rec.type==='monthly'){
    const dom=rec.dayOfMonth||1;
    let d=new Date(startDate.getFullYear(),startDate.getMonth(),dom);
    if(d<startDate)d.setMonth(d.getMonth()+1);
    while(d<=end){dates.push(dStr2(d));d=new Date(d.getFullYear(),d.getMonth()+1,dom);}
  }
  return[...new Set(dates)].sort();
}

function ensurePeriods(task){
  if(!task.isRecurring||!task.recurrence)return{task,changed:false};
  const rec=task.recurrence;
  const now=new Date();
  const maxDate=new Date(now.getTime()+14*86400000);
  const hardEnd=rec.endDate?new Date(rec.endDate+'T23:59:59'):null;
  const effectiveEnd=hardEnd&&hardEnd<maxDate?hardEnd:maxDate;
  const startDate=new Date(rec.startDate+'T00:00:00');
  const dates=getRecDates(rec,startDate,effectiveEnd);
  const existing=new Set((task.periods||[]).map(p=>p.deadline.slice(0,10)));
  const toAdd=dates.filter(d=>!existing.has(d));
  if(!toAdd.length)return{task,changed:false};
  const time=rec.time||'23:59';
  const newPeriods=toAdd.map(d=>{
    const subs={};task.members.forEach(m=>{subs[m]={status:'not_started',updatedAt:'',log:[]};});
    return{id:uid(),deadline:`${d}T${time}:00`,submissions:subs};
  });
  const all=[...(task.periods||[]),...newPeriods].sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  return{task:{...task,periods:all},changed:true};
}

async function autoGenerate(){
  let changed=false;
  S.tasks=S.tasks.map(t=>{
    const {task,changed:c}=ensurePeriods(t);
    if(c)changed=true;
    return task;
  });
  if(changed)await saveData();
}

/* ══ GIST API ══ */
async function gistGet(){
  const h={Authorization:`token ${S.token}`,Accept:'application/vnd.github.v3+json'};
  if(S.lastEtag)h['If-None-Match']=S.lastEtag;
  const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:h});
  if(r.status===304)return null;
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  S.lastEtag=r.headers.get('ETag')||'';
  const g=await r.json();
  return JSON.parse(g.files?.[GIST_FILE]?.content||'{"tasks":[]}');
}
async function gistSet(data){
  const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{method:'PATCH',headers:{Authorization:`token ${S.token}`,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(data,null,2)}}})});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  S.lastEtag='';
}

/* ══ INIT / SYNC ══ */
async function init(){
  S.token=localStorage.getItem(TOKEN_KEY)||'';
  if(!S.token){S.screen='setup';hideLoading();render();return;}
  try{
    const d=await gistGet();
    S.tasks=(!d||!d.tasks?.length)?SAMPLE:d.tasks.map(migrateTask);
    if(!d||!d.tasks?.length)await gistSet({tasks:S.tasks});
    S.syncTime=new Date();S.screen='login';
    await autoGenerate();
  }catch{localStorage.removeItem(TOKEN_KEY);S.token='';S.screen='setup';}
  hideLoading();render();startSync();
}
function migrateTask(t){return{isRecurring:false,deadlineTime:'',submissions:{},...t};}
function hideLoading(){
  const el=document.getElementById('loading');el.style.opacity='0';
  setTimeout(()=>{el.style.display='none';document.getElementById('app').style.display='';},400);
}
let syncTimer=null;
function startSync(){
  clearInterval(syncTimer);
  syncTimer=setInterval(async()=>{
    if(S.screen!=='main'||S.editKey||S.saving)return;
    try{
      const d=await gistGet();
      if(d&&JSON.stringify(d.tasks)!==JSON.stringify(S.tasks)){S.tasks=d.tasks.map(migrateTask);render();}
      S.syncTime=new Date();S.syncError=false;updSync();
    }catch{S.syncError=true;updSync();}
  },SYNC_MS);
}
function updSync(){
  const el=document.getElementById('syncPill');if(!el)return;
  const t=S.syncTime?S.syncTime.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
  el.innerHTML=S.syncError?`<span class="sdot err"></span> 同步失敗`:`<span class="sdot"></span> 同步中 · 上次 ${t}`;
}
async function saveData(){
  S.saving=true;
  try{await gistSet({tasks:S.tasks});S.syncTime=new Date();S.syncError=false;S.lastEtag='';}
  catch{toast('❌ 儲存失敗');}
  S.saving=false;
}

/* ══ HELPERS ══ */
function dStr2(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function fmtTs(iso){if(!iso)return '';const d=new Date(iso);return d.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})+' '+d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
function fmtDT(dt){if(!dt)return '';return dt.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})+' '+dt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
function fmtTaskDL(task,period){
  if(task.isRecurring){const p=period||getCurrentPeriod(task);return p?fmtDT(new Date(p.deadline)):'';}
  if(!task.deadline)return '';
  return task.deadline+(task.deadlineTime?' '+task.deadlineTime:'');
}
function isOver(dt){return dt&&dt<new Date();}
function isSoon(dt){if(!dt)return false;const v=dt-new Date();return v>0&&v<3*86400000;}
function taskAllDone(t,p){return (t.members||[]).every(m=>getSubs(t,p)[m]?.status==='completed');}
function taskPending(t,p){return (t.members||[]).filter(m=>getSubs(t,p)[m]?.status!=='completed').length;}
function isMine(t){return(t.members||[]).includes(S.userName);}
function myStatus(t,p){return getSubs(t,p)[S.userName]?.status||null;}
function tasksOnDate(ds){
  const res=[];
  for(const t of S.tasks){
    if(t.isRecurring){
      const ps=(t.periods||[]).filter(p=>p.deadline.slice(0,10)===ds);
      ps.forEach(p=>res.push({task:t,period:p}));
    } else {
      if(t.deadline===ds)res.push({task:t,period:null});
    }
  }
  return res;
}
function allMembers(){const s=new Set();S.tasks.forEach(t=>(t.members||[]).forEach(m=>s.add(m)));return[...s].sort();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function recLabel(task){
  if(!task.isRecurring||!task.recurrence)return '';
  const r=task.recurrence,lbl=REC_LBL[r.type]||r.type;
  if((r.type==='weekly'||r.type==='biweekly')&&r.daysOfWeek?.length)return`${lbl}${r.daysOfWeek.map(d=>'（'+DOW[d]+'）').join('')}`;
  if(r.type==='monthly'&&r.dayOfMonth)return`${lbl}（${r.dayOfMonth}日）`;
  return lbl;
}
function periodIndex(task,period){return(task.periods||[]).findIndex(p=>p.id===period.id)+1;}
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

/* ── TASK CARD ── */
function rTask(task){
  const exp=S.expanded.has(task.id);
  const cp=getCurrentPeriod(task);
  const subs=getSubs(task);
  const dl=getDeadlineDT(task);
  const od=isOver(dl)&&!taskAllDone(task);
  const sn=isSoon(dl);
  const pending=taskPending(task);
  const done=(task.members||[]).length-pending;
  const ms=myStatus(task);
  const pills=(task.members||[]).map(m=>{const sub=subs[m]||{status:'not_started'};const st=ST[sub.status]||ST.not_started;return`<span class="mpill ${st.pcls}"><span class="pdot" style="background:${DOTC[st.pcls]}"></span>${esc(m)}</span>`;}).join('');
  const dlStr=fmtTaskDL(task);
  return`<div class="task-card ${od?'overdue':''}" data-taskid="${task.id}" draggable="true">
  <div class="task-head" id="hd_${task.id}">
    <div class="drag-handle">☰</div>
    <div class="th-inner">
      <div class="th-row">
        <div class="th-left">
          <div class="ttl">
            ${task.isRecurring?'<span class="badge bg-p">🔁 定期</span>':''}
            ${ragBadge(task)}
            ${esc(task.title)}
            ${task.isRecurring&&cp?`<span class="badge bg-b">第 ${periodIndex(task,cp)} 期</span>`:''}
            ${taskAllDone(task)?`<span class="badge bg-g">✓ 完成</span>`:`<span class="badge bg-a">${pending} 人未繳</span>`}
            ${od?`<span class="badge bg-r">⚠ 逾期</span>`:''}
            ${sn?`<span class="badge bg-a">⏰ 即將到期</span>`:''}
            ${isMine(task)&&ms?`<span class="badge ${(ST[ms]||ST.not_started).bdg}">我：${(ST[ms]||ST.not_started).lbl}</span>`:''}
          </div>
          <div class="tmeta">
            <span class="tm">👥 ${(task.members||[]).length} 位成員 · 已繳 ${done}</span>
            ${dlStr?`<span class="tm ${od?'red':''}">📅 截止 ${dlStr}</span>`:''}
            ${task.isRecurring?`<span class="tm">🔄 ${recLabel(task)}</span>`:''}
          </div>
          <div class="mbar">${pills}</div>
        </div>
        <div class="th-actions">
          <button class="btn btn-purple btn-icon" id="copyBtn_${task.id}" title="複製任務">📋</button>
          <button class="btn btn-amber btn-icon" id="editTaskBtn_${task.id}" title="編輯任務">✏️</button>
          <button class="btn btn-danger btn-icon" id="delTaskBtn_${task.id}" title="刪除任務">🗑</button>
          <span class="exp-icon ${exp?'open':''}">▼</span>
        </div>
      </div>
    </div>
  </div>
  ${exp?(task.isRecurring?rRecBody(task):rNormalBody(task)):''}
</div>`;
}

function rNormalBody(task){
  return`<div class="task-body">${(task.members||[]).map(m=>rMemberRow(task,null,m)).join('')}</div>`;
}

function rRecBody(task){
  const now=new Date();
  const sorted=[...(task.periods||[])].sort((a,b)=>new Date(b.deadline)-new Date(a.deadline));
  const cp=getCurrentPeriod(task);
  const history=sorted.filter(p=>p!==cp);
  const showHist=S.showHistory.has(task.id);
  let html=`<div class="task-body">`;
  if(cp){
    html+=`<div class="period-head current">
      <span class="period-num">第 ${periodIndex(task,cp)} 期</span>
      <span class="period-dl">截止 ${fmtDT(new Date(cp.deadline))}</span>
      <span class="badge bg-b">當期</span>
      ${ragBadge(task,cp)}
    </div>`;
    html+=(task.members||[]).map(m=>rMemberRow(task,cp,m)).join('');
  }
  if(history.length){
    html+=`<button class="history-btn" id="histBtn_${task.id}">
      ${showHist?'▲ 收起歷史紀錄':`▼ 顯示歷史紀錄（${history.length} 期）`}
    </button>`;
    if(showHist){
      history.forEach(period=>{
        const pid=period.id;
        const hExp=S.expandedHistPeriods.has(pid);
        const allDone=(task.members||[]).every(m=>period.submissions[m]?.status==='completed');
        html+=`<div class="hist-period">
          <div class="hist-period-head" id="histPH_${pid}">
            <span class="period-num">第 ${periodIndex(task,period)} 期</span>
            <span class="period-dl">截止 ${fmtDT(new Date(period.deadline))}</span>
            ${allDone?`<span class="badge bg-g">✓ 完成</span>`:`<span class="badge bg-a">${taskPending(task,period)} 人未繳</span>`}
            <span class="exp-icon ${hExp?'open':''}" style="margin-left:auto">▼</span>
          </div>
          ${hExp?(task.members||[]).map(m=>rMemberRowHistory(task,period,m)).join(''):''}
        </div>`;
      });
    }
  }
  html+='</div>';
  return html;
}

/* ── MEMBER ROWS ── */
function makeKey(task,period,member){
  return period?`${task.id}~~${period.id}~~${member}`:`${task.id}~~${member}`;
}
function parseKey(key){const p=key.split('~~');return p.length===3?{tid:p[0],pid:p[1],member:p[2]}:{tid:p[0],pid:null,member:p[1]};}

function rMemberRow(task,period,member){
  const subs=getSubs(task,period);
  const sub=subs[member]||{status:'not_started',updatedAt:'',log:[]};
  const st=ST[sub.status]||ST.not_started;
  const key=makeKey(task,period,member);
  const isEditing=S.editKey===key;
  const log=[...(sub.log||[])].reverse();
  const logHtml=log.length?log.map((e,i)=>`<div class="log-e ${i===0?'latest':''}"><div class="lm">${fmtTs(e.at)}</div>${esc(e.content)}</div>`).join(''):`<div class="no-log">尚無更新記錄</div>`;
  return`<div>
  <div class="mr">
    <div class="mr-l"><div class="mr-name">${esc(member)}${member===S.userName?' <span style="font-size:10px;color:#94a3b8">（我）</span>':''}</div>
      <span class="badge ${st.bdg}">${st.lbl}</span>
      ${sub.updatedAt?`<div style="font-size:10px;color:#94a3b8;margin-top:3px">${fmtTs(sub.updatedAt)}</div>`:''}
    </div>
    <div class="mr-m"><div class="log-list">${logHtml}</div></div>
    <div class="mr-r"><button class="btn ${isEditing?'btn-ghost':'btn-navy'} btn-sm" data-edit="${key}">${isEditing?'取消':'✏️ 更新'}</button></div>
  </div>
  ${isEditing?rInlineEdit(sub,key):''}
</div>`;
}

function rMemberRowHistory(task,period,member){
  const sub=period.submissions[member]||{status:'not_started',updatedAt:'',log:[]};
  const st=ST[sub.status]||ST.not_started;
  const log=[...(sub.log||[])].reverse();
  const logHtml=log.length?log.map((e,i)=>`<div class="log-e ${i===0?'latest':''}"><div class="lm">${fmtTs(e.at)}</div>${esc(e.content)}</div>`).join(''):`<div class="no-log">尚無更新記錄</div>`;
  return`<div class="mr" style="opacity:.8">
    <div class="mr-l"><div class="mr-name">${esc(member)}</div><span class="badge ${st.bdg}">${st.lbl}</span></div>
    <div class="mr-m"><div class="log-list">${logHtml}</div></div>
    <div class="mr-r"></div>
  </div>`;
}

/* ── CALENDAR TAB ── */
function rCalTab(){
  const d=S.calDate,y=d.getFullYear(),m=d.getMonth();
  let title='',body='';
  if(S.calView==='year'){title=`${y} 年`;body=rCalYear(y);}
  else if(S.calView==='month'){title=`${y} 年 ${MONTHS[m]}`;body=rCalMonth(y,m);}
  else{const dow=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-dow+1);const sun=new Date(mon);sun.setDate(mon.getDate()+6);title=`${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()}`;body=rCalWeek(d);}
  return`<div class="cal-wrap">
  <div class="cal-header">
    <div class="cal-nav">
      <button class="btn btn-ghost btn-sm" id="calPrev">◀</button>
      <div class="cal-title">${title}</div>
      <button class="btn btn-ghost btn-sm" id="calNext">▶</button>
      <button class="btn btn-ghost btn-sm" id="calToday">今天</button>
    </div>
    <div class="cal-vt">
      <button class="cvt ${S.calView==='year'?'active':''}" data-cv="year">年</button>
      <button class="cvt ${S.calView==='month'?'active':''}" data-cv="month">月</button>
      <button class="cvt ${S.calView==='week'?'active':''}" data-cv="week">週</button>
    </div>
  </div>
  <div class="cal-body">${body}</div>
</div>`;
}
function rCalMonth(y,m){
  const today=new Date(),fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),diP=new Date(y,m,0).getDate();
  let cells='';
  for(let i=fd-1;i>=0;i--)cells+=rCalCell(y,m-1,diP-i,true,today);
  for(let d=1;d<=dim;d++)cells+=rCalCell(y,m,d,false,today);
  const next=(7-(fd+dim)%7)%7;
  for(let d=1;d<=next;d++)cells+=rCalCell(y,m+1,d,true,today);
  return`<div class="cal-dow">${DOW.map(d=>`<div class="cal-dow-lbl">${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div>`;
}
function rCalCell(y,m,day,other,today){
  const ds=dStr(y,m,day),isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===day;
  const entries=tasksOnDate(ds);
  const evs=entries.slice(0,3).map(({task,period})=>{const c=ragColor(task,period);return`<div class="cal-ev" style="background:${c.bg};color:${c.txt}" data-dayClick="${ds}"><span class="cal-ev-dot" style="background:${c.dot}"></span>${esc(task.title)}</div>`;}).join('');
  const more=entries.length>3?`<div class="cal-more" data-dayClick="${ds}">+${entries.length-3} 更多</div>`:'';
  return`<div class="cal-cell ${isT?'today':''} ${other?'other-month':''}" data-dayClick="${ds}"><div class="cal-day">${isT?`<span class="today-num">${day}</span>`:day}</div><div class="cal-events">${evs}${more}</div></div>`;
}
function rCalWeek(date){
  const dow=date.getDay(),mon=new Date(date);mon.setDate(date.getDate()-dow+1);
  const today=new Date();
  return`<div class="week-grid">${Array.from({length:7},(_,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=dStr2(d);const isT=d.toDateString()===today.toDateString();
    const evs=tasksOnDate(ds).map(({task,period})=>{const c=ragColor(task,period);return`<div class="week-ev" style="background:${c.bg};color:${c.txt}" data-dayClick="${ds}"><span class="week-ev-dot" style="background:${c.dot}"></span>${esc(task.title)}</div>`;}).join('');
    return`<div class="week-col ${isT?'today':''}"><div class="week-col-head"><div class="week-dow">${DOW[d.getDay()]}</div><div class="week-day">${d.getDate()}</div></div><div class="week-col-body">${evs}</div></div>`;
  }).join('')}</div>`;
}
function rCalYear(y){
  const today=new Date();
  return`<div class="year-grid">${Array.from({length:12},(_,mi)=>{
    const fd=new Date(y,mi,1).getDay(),dim=new Date(y,mi+1,0).getDate();
    let c='';for(let i=0;i<fd;i++)c+=`<div class="yr-cell other-m"></div>`;
    for(let d=1;d<=dim;d++){const ds=dStr(y,mi,d);const isT=today.getFullYear()===y&&today.getMonth()===mi&&today.getDate()===d;const ht=tasksOnDate(ds).length>0;c+=`<div class="yr-cell ${isT?'today':''} ${ht?'has-tasks':''}" data-dayClick="${ds}">${d}</div>`;}
    return`<div class="yr-month"><div class="yr-month-head">${MONTHS[mi]}</div><div class="yr-dow">${DOW.map(d=>`<div class="yr-dow-lbl">${d}</div>`).join('')}</div><div class="yr-grid-inner">${c}</div></div>`;
  }).join('')}</div>`;
}
function rDayPopup(ds){
  const entries=tasksOnDate(ds);const dateObj=new Date(ds);
  const items=entries.length?entries.map(({task,period})=>{
    const subs=getSubs(task,period);
    const mRows=(task.members||[]).map(m=>{const sub=subs[m]||{status:'not_started'};const st=ST[sub.status]||ST.not_started;return`<div class="day-task-m"><span>${esc(m)}</span><span class="badge ${st.bdg}">${st.lbl}</span></div>`;}).join('');
    const dl=period?fmtDT(new Date(period.deadline)):(task.deadline+(task.deadlineTime?' '+task.deadlineTime:''));
    return`<div class="day-task-item"><div style="font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:7px;flex-wrap:wrap">${ragBadge(task,period)} ${esc(task.title)} ${period?`<span class="badge bg-b">第${periodIndex(task,period)}期</span>`:''}<span style="font-size:11px;color:#94a3b8">${dl}</span></div><div>${mRows}</div></div>`;
  }).join(''):`<div style="font-size:13px;color:#94a3b8;text-align:center;padding:20px">這天沒有截止任務</div>`;
  return`<div class="day-popup" id="dayPopup"><div class="day-popup-inner">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:15px;font-weight:700;color:var(--navy)">📅 ${dateObj.getMonth()+1}月${dateObj.getDate()}日</div>
    <button class="btn btn-ghost btn-sm" id="closeDayPopup">✕</button>
  </div>${items}</div></div>`;
}

function rUsersTab(){

    const pending=myTasks.filter(t=>getSubs(t)[member]?.status!=='completed').length;
    const done=myTasks.filter(t=>getSubs(t)[member]?.status==='completed').length;
    const rows=q?myTasks.map(t=>{const sub=getSubs(t)[member]||{status:'not_started'};const st=ST[sub.status]||ST.not_started;return`<div class="usc-task"><span>${esc(t.title)}${t.isRecurring?` <span class="badge bg-p" style="font-size:10px">🔁</span>`:''}</span><span class="badge ${st.bdg}">${st.lbl}</span></div>`;}).join(''):'';
    return`<div class="user-stat-card"><div class="usc-head"><div class="usc-name">👤 ${esc(member)}</div><div style="display:flex;gap:7px;flex-wrap:wrap"><span class="badge bg-r">未完成 ${pending}</span><span class="badge bg-g">已完成 ${done}</span><span class="badge bg-gr">共 ${myTasks.length} 項</span></div></div>${rows?`<div class="usc-body">${rows}</div>`:''}</div>`;
  }).join(''):`<div style="font-size:13px;color:#94a3b8;text-align:center;padding:24px">找不到符合的成員</div>`;
  return`<div class="user-panel"><h3>成員進度查詢</h3>
  <div class="user-search-row"><input class="inp" id="userSearchIn" placeholder="輸入成員姓名搜尋…" value="${esc(S.userSearch)}"/>${S.userSearch?`<button class="btn btn-ghost btn-sm" id="clearUserSearch">清除</button>`:''}</div>
  <div>${cards}</div></div>`;
}

/* ══ BIND ══ */
function bind(){
  const $=id=>document.getElementById(id);

  // setup
  const tI=$('tokIn');
  if(tI){tI.addEventListener('input',e=>{$('saveTokenBtn').disabled=!e.target.value.trim();});tI.addEventListener('keydown',e=>{if(e.key==='Enter'&&tI.value.trim())doSaveToken();});$('saveTokenBtn').addEventListener('click',doSaveToken);}

  // login
  const nI=$('nameIn');
  if(nI){nI.addEventListener('input',e=>{S.nameInput=e.target.value;$('loginBtn').disabled=!e.target.value.trim();});nI.addEventListener('keydown',e=>{if(e.key==='Enter'&&S.nameInput?.trim())doLogin();});$('loginBtn').addEventListener('click',doLogin);$('resetTokBtn').addEventListener('click',()=>{localStorage.removeItem(TOKEN_KEY);S.token='';S.screen='setup';render();});}

  // tabs
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));

  // tasks toolbar
  const tA=$('toggleAddBtn');if(tA)tA.addEventListener('click',()=>{S.showAdd=!S.showAdd;S.newMembers=[];S.memberInput='';S.addIsRec=false;S.addRecType='weekly';S.addRecDays=[5];render();});
  const cA=$('cancelAddBtn');if(cA)cA.addEventListener('click',()=>{S.showAdd=false;render();});
  const sU=$('switchUserBtn');if(sU)sU.addEventListener('click',()=>{S.screen='login';S.editKey=null;S.showAdd=false;render();});
  const sI=$('searchIn');if(sI)sI.addEventListener('input',e=>{S.search=e.target.value;render();});
  document.querySelectorAll('[data-f]').forEach(b=>b.addEventListener('click',()=>{S.filter=b.dataset.f;render();}));

  // add form
  const nIsRec=$('nIsRec');
  if(nIsRec)nIsRec.addEventListener('change',e=>{S.addIsRec=e.target.checked;render();});
  const nRecType=$('nRecType');
  if(nRecType)nRecType.addEventListener('change',e=>{S.addRecType=e.target.value;render();});
  document.querySelectorAll('.addDowBtn').forEach(b=>b.addEventListener('click',()=>{
    const dow=parseInt(b.dataset.dow);
    const idx=S.addRecDays.indexOf(dow);
    if(idx>=0)S.addRecDays.splice(idx,1);else S.addRecDays.push(dow);
    b.classList.toggle('active',S.addRecDays.includes(dow));
  }));
  const mI=$('memberIn');
  if(mI){mI.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addMember();}});const aM=$('addMemberBtn');if(aM)aM.addEventListener('click',addMember);}
  document.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{S.newMembers=(S.newMembers||[]).filter(m=>m!==b.dataset.rm);render();}));
  const dA=$('doAddTaskBtn');if(dA)dA.addEventListener('click',addTask);

  // task heads
  S.tasks.forEach(task=>{
    const h=$(`hd_${task.id}`);
    if(h)h.addEventListener('click',e=>{
      if(['copyBtn_','editTaskBtn_','delTaskBtn_'].some(p=>e.target.id===p+task.id)||e.target.closest('.drag-handle')||e.target.closest('[data-edit]'))return;
      S.expanded.has(task.id)?S.expanded.delete(task.id):S.expanded.add(task.id);render();
    });
    // copy
    const cpBtn=$(`copyBtn_${task.id}`);
    if(cpBtn)cpBtn.addEventListener('click',e=>{e.stopPropagation();copyTask(task.id);});
    // edit
    const eBtn=$(`editTaskBtn_${task.id}`);
    if(eBtn)eBtn.addEventListener('click',e=>{
      e.stopPropagation();
      S.editTaskId=task.id;
      S.editTaskMembers=[...task.members];
      S.editTaskRecDays=[...(task.recurrence?.daysOfWeek||[])];
      render();
    });
    // delete
    const dBtn=$(`delTaskBtn_${task.id}`);
    if(dBtn)dBtn.addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm(`確定要刪除「${task.title}」嗎？`)){S.tasks=S.tasks.filter(x=>x.id!==task.id);S.expanded.delete(task.id);saveData();render();toast('已刪除任務');}
    });
    // history toggle
    const hBtn=$(`histBtn_${task.id}`);
    if(hBtn)hBtn.addEventListener('click',e=>{e.stopPropagation();S.showHistory.has(task.id)?S.showHistory.delete(task.id):S.showHistory.add(task.id);render();});
    // history period heads
    (task.periods||[]).forEach(period=>{
      const ph=$(`histPH_${period.id}`);
      if(ph)ph.addEventListener('click',e=>{e.stopPropagation();S.expandedHistPeriods.has(period.id)?S.expandedHistPeriods.delete(period.id):S.expandedHistPeriods.add(period.id);render();});
    });
  });

  // member row edit
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const key=b.dataset.edit;
    if(S.editKey===key){S.editKey=null;S.editData={};}
    else{const {tid,pid,member}=parseKey(key);const task=S.tasks.find(t=>t.id===tid);const period=pid?(task?.periods||[]).find(p=>p.id===pid):null;const subs=getSubs(task,period);const sub=subs[member]||{};S.editKey=key;S.editData={status:sub.status||'not_started',content:'',date:new Date().toISOString().slice(0,16)};}
    render();
  }));
  const eS=$('eStatus'),eC=$('eContent'),eD=$('eDate');
  if(eS)eS.addEventListener('change',e=>S.editData.status=e.target.value);
  if(eC)eC.addEventListener('input',e=>S.editData.content=e.target.value);
  if(eD)eD.addEventListener('change',e=>S.editData.date=e.target.value);
  const sv=$('saveEditBtn');if(sv)sv.addEventListener('click',doSaveEdit);
  const cv=$('cancelEditBtn');if(cv)cv.addEventListener('click',()=>{S.editKey=null;S.editData={};render();});

  // edit task modal
  document.querySelectorAll('.rmEditMember').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();S.editTaskMembers=S.editTaskMembers.filter(m=>m!==b.dataset.m);refreshEditTags();}));
  document.querySelectorAll('.editDowBtn').forEach(b=>b.addEventListener('click',()=>{
    const dow=parseInt(b.dataset.dow);
    const idx=S.editTaskRecDays.indexOf(dow);
    if(idx>=0)S.editTaskRecDays.splice(idx,1);else S.editTaskRecDays.push(dow);
    b.classList.toggle('active',S.editTaskRecDays.includes(dow));
  }));
  const etM=$('etMemberIn');
  if(etM){etM.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addMemberToEdit();}});const etA=$('etAddBtn');if(etA)etA.addEventListener('click',addMemberToEdit);}
  const setBtn=$('saveEditTaskBtn');if(setBtn)setBtn.addEventListener('click',doSaveEditTask);
  const cetBtn=$('cancelEditTaskBtn');if(cetBtn)cetBtn.addEventListener('click',()=>{S.editTaskId=null;render();});
  const etOv=$('editOverlay');if(etOv)etOv.addEventListener('click',e=>{if(e.target===etOv){S.editTaskId=null;render();}});

  // calendar
  const cp=$('calPrev'),cn=$('calNext'),ct=$('calToday');
  if(cp)cp.addEventListener('click',()=>calNav(-1));
  if(cn)cn.addEventListener('click',()=>calNav(1));
  if(ct)ct.addEventListener('click',()=>{S.calDate=new Date();render();});
  document.querySelectorAll('[data-cv]').forEach(b=>b.addEventListener('click',()=>{S.calView=b.dataset.cv;render();}));
  document.querySelectorAll('[data-dayClick]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.dayPopup=el.dataset.dayClick;render();}));
  const cdp=$('closeDayPopup');if(cdp)cdp.addEventListener('click',()=>{S.dayPopup=null;render();});
  const dpEl=$('dayPopup');if(dpEl)dpEl.addEventListener('click',e=>{if(e.target===dpEl){S.dayPopup=null;render();}});

  // users
  const usI=$('userSearchIn');if(usI)usI.addEventListener('input',e=>{S.userSearch=e.target.value;render();});
  const cuS=$('clearUserSearch');if(cuS)cuS.addEventListener('click',()=>{S.userSearch='';render();});

  bindDrag();
}

function refreshEditTags(){
  const el=document.getElementById('etMemberTags');if(!el)return;
  el.innerHTML=S.editTaskMembers.map(m=>`<span class="mtag">${esc(m)}<button class="rmEditMember" data-m="${esc(m)}">×</button></span>`).join('')||'<span style="font-size:12px;color:#94a3b8">尚未新增成員</span>';
  el.querySelectorAll('.rmEditMember').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();S.editTaskMembers=S.editTaskMembers.filter(m=>m!==b.dataset.m);refreshEditTags();}));
}

function bindDrag(){
  document.querySelectorAll('.task-card[data-taskid]').forEach(card=>{
    card.addEventListener('dragstart',e=>{S.dragSrcId=card.dataset.taskid;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';if(card.dataset.taskid!==S.dragSrcId){document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));card.classList.add('drag-over');}});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      const toId=card.dataset.taskid;if(!S.dragSrcId||S.dragSrcId===toId)return;
      const fi=S.tasks.findIndex(t=>t.id===S.dragSrcId),ti=S.tasks.findIndex(t=>t.id===toId);
      if(fi<0||ti<0)return;
      const arr=[...S.tasks];const[item]=arr.splice(fi,1);arr.splice(ti,0,item);
      S.tasks=arr;S.dragSrcId=null;saveData();render();toast('✅ 順序已更新');
    });
  });
}

function calNav(dir){
  const d=new Date(S.calDate);
  if(S.calView==='year')d.setFullYear(d.getFullYear()+dir);
  else if(S.calView==='month')d.setMonth(d.getMonth()+dir);
  else d.setDate(d.getDate()+dir*7);
  S.calDate=d;render();
}

/* ══ ACTIONS ══ */
async function doSaveToken(){
  const val=document.getElementById('tokIn')?.value?.trim();if(!val)return;
  S.token=val;localStorage.setItem(TOKEN_KEY,val);
  const btn=document.getElementById('saveTokenBtn');if(btn){btn.disabled=true;btn.textContent='驗證中…';}
  try{
    const d=await gistGet();
    S.tasks=(!d||!d.tasks?.length)?SAMPLE:d.tasks.map(migrateTask);
    if(!d||!d.tasks?.length)await gistSet({tasks:S.tasks});
    S.syncTime=new Date();S.screen='login';render();startSync();
    await autoGenerate();
    toast('✅ Token 驗證成功！');
  }catch(e){
    localStorage.removeItem(TOKEN_KEY);S.token='';
    if(btn){btn.disabled=false;btn.textContent='儲存並進入系統';}
    alert('❌ Token 無效或無法存取 Gist。\n\n錯誤：'+e.message);
  }
}
function doLogin(){
  const n=(document.getElementById('nameIn')?.value||S.nameInput||'').trim();if(!n)return;
  S.userName=n;S.nameInput=n;S.screen='main';render();
}
function addMember(){
  const mI=document.getElementById('memberIn');const m=(mI?.value||'').trim();if(!m)return;
  if((S.newMembers||[]).includes(m)){toast('已新增過此成員');return;}
  S.newMembers=[...(S.newMembers||[]),m];if(mI)mI.value='';
  const tags=document.querySelector('.task-form .mtags');
  if(tags){tags.innerHTML=S.newMembers.map(mm=>`<span class="mtag">${esc(mm)}<button data-rm="${esc(mm)}">×</button></span>`).join('');tags.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{S.newMembers=S.newMembers.filter(m=>m!==b.dataset.rm);const t=document.querySelector('.task-form .mtags');if(t)t.innerHTML=S.newMembers.map(mm=>`<span class="mtag">${esc(mm)}<button data-rm="${esc(mm)}">×</button></span>`).join('')||'<span style="font-size:12px;color:#94a3b8">尚未新增成員</span>';b.closest('.task-form .mtags')?.querySelectorAll('[data-rm]').forEach(b2=>b2.addEventListener('click',arguments.callee));}));}
}
function addMemberToEdit(){
  const etM=document.getElementById('etMemberIn');const m=(etM?.value||'').trim();if(!m)return;
  if(S.editTaskMembers.includes(m)){toast('已新增過此成員');return;}
  S.editTaskMembers.push(m);if(etM)etM.value='';refreshEditTags();
}

async function addTask(){
  const title=document.getElementById('nTitle')?.value?.trim();
  if(!title){toast('請輸入任務名稱');return;}
  if(!(S.newMembers||[]).length){toast('請至少新增一位成員');return;}
  const subs={};(S.newMembers||[]).forEach(m=>{subs[m]={status:'not_started',updatedAt:'',log:[]};});
  let newTask;
  if(S.addIsRec){
    const recType=document.getElementById('nRecType')?.value||'weekly';
    const recTime=document.getElementById('nRecTime')?.value||'17:00';
    const recStart=document.getElementById('nRecStart')?.value||new Date().toISOString().split('T')[0];
    const recEnd=document.getElementById('nRecEnd')?.value||'';
    const recDom=parseInt(document.getElementById('nRecDom')?.value||'1');
    const daysOfWeek=[...S.addRecDays].sort();
    if((recType==='weekly'||recType==='biweekly')&&!daysOfWeek.length){toast('請選擇至少一個重複星期');return;}
    const rec={type:recType,daysOfWeek,dayOfMonth:recDom,time:recTime,startDate:recStart,endDate:recEnd};
    newTask={id:uid(),title,isRecurring:true,recurrence:rec,members:[...S.newMembers],periods:[],createdAt:new Date().toISOString()};
    const{task:generated}=ensurePeriods(newTask);
    newTask=generated;
  } else {
    const deadline=document.getElementById('nDeadline')?.value||'';
    const deadlineTime=document.getElementById('nDeadlineTime')?.value||'';
    newTask={id:uid(),title,isRecurring:false,deadline,deadlineTime,members:[...S.newMembers],submissions:subs,createdAt:new Date().toISOString()};
  }
  S.tasks.push(newTask);S.showAdd=false;S.newMembers=[];S.addIsRec=false;S.addRecType='weekly';S.addRecDays=[5];
  S.expanded.add(newTask.id);
  await saveData();render();toast('✅ 已新增任務');
}

function copyTask(id){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const subs={};(task.members||[]).forEach(m=>{subs[m]={status:'not_started',updatedAt:'',log:[]};});
  const newTask={
    ...task,id:uid(),title:`複製 - ${task.title}`,
    isRecurring:false,
    deadline:task.isRecurring?'':task.deadline||'',
    deadlineTime:task.isRecurring?(task.recurrence?.time||''):task.deadlineTime||'',
    submissions:subs,
    periods:undefined,recurrence:undefined,
    createdAt:new Date().toISOString(),
  };
  delete newTask.periods;delete newTask.recurrence;
  const idx=S.tasks.findIndex(t=>t.id===id);
  S.tasks.splice(idx+1,0,newTask);
  S.expanded.add(newTask.id);
  saveData();render();toast('✅ 已複製任務（一次性）');
}

async function doSaveEditTask(){
  const title=document.getElementById('etTitle')?.value?.trim();
  if(!title){toast('請輸入任務名稱');return;}
  if(!S.editTaskMembers.length){toast('請至少保留一位成員');return;}
  const task=S.tasks.find(t=>t.id===S.editTaskId);if(!task)return;
  const newSubs={};S.editTaskMembers.forEach(m=>{newSubs[m]=task.submissions?.[m]||task.periods?.[0]?.submissions?.[m]||{status:'not_started',updatedAt:'',log:[]};});
  if(!task.isRecurring){
    const deadline=document.getElementById('etDeadline')?.value||'';
    const deadlineTime=document.getElementById('etDeadlineTime')?.value||'';
    S.tasks=S.tasks.map(t=>t.id!==S.editTaskId?t:{...t,title,deadline,deadlineTime,members:[...S.editTaskMembers],submissions:newSubs});
  } else {
    const recType=document.getElementById('etRecType')?.value||task.recurrence.type;
    const recTime=document.getElementById('etRecTime')?.value||task.recurrence.time;
    const recStart=document.getElementById('etRecStart')?.value||task.recurrence.startDate;
    const recEnd=document.getElementById('etRecEnd')?.value||'';
    const recDom=parseInt(document.getElementById('etRecDom')?.value||task.recurrence.dayOfMonth||1);
    const rec={type:recType,daysOfWeek:[...S.editTaskRecDays].sort(),dayOfMonth:recDom,time:recTime,startDate:recStart,endDate:recEnd};
    // Update members in all periods
    const updatedPeriods=(task.periods||[]).map(p=>{
      const newPSubs={};S.editTaskMembers.forEach(m=>{newPSubs[m]=p.submissions[m]||{status:'not_started',updatedAt:'',log:[]};});
      return{...p,submissions:newPSubs};
    });
    let updated={...task,title,recurrence:rec,members:[...S.editTaskMembers],periods:updatedPeriods};
    const{task:generated}=ensurePeriods(updated);
    S.tasks=S.tasks.map(t=>t.id!==S.editTaskId?t:generated);
  }
  S.editTaskId=null;await saveData();render();toast('✅ 任務已更新');
}

async function doSaveEdit(){
  const eS=document.getElementById('eStatus'),eC=document.getElementById('eContent'),eD=document.getElementById('eDate');
  if(eS)S.editData.status=eS.value;if(eC)S.editData.content=eC.value;if(eD)S.editData.date=eD.value;
  const content=(S.editData.content||'').trim();if(!content){toast('請填寫本次更新內容');return;}
  const {tid,pid,member}=parseKey(S.editKey);
  const at=S.editData.date?new Date(S.editData.date).toISOString():new Date().toISOString();
  S.tasks=S.tasks.map(task=>{
    if(task.id!==tid)return task;
    if(pid){
      // Recurring
      return{...task,periods:(task.periods||[]).map(p=>{
        if(p.id!==pid)return p;
        const ex=p.submissions[member]||{log:[]};
        return{...p,submissions:{...p.submissions,[member]:{status:S.editData.status,updatedAt:new Date().toISOString(),log:[...(ex.log||[]),{content,at}]}}};
      })};
    } else {
      const ex=task.submissions[member]||{log:[]};
      return{...task,submissions:{...task.submissions,[member]:{status:S.editData.status,updatedAt:new Date().toISOString(),log:[...(ex.log||[]),{content,at}]}}};
    }
  });
  S.editKey=null;S.editData={};await saveData();render();toast('✅ 已儲存更新');
}

/* ── INIT ── */
if(!S.newMembers)S.newMembers=[];
init();
</script>
