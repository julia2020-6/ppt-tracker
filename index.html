<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簡報進度追蹤系統</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+TC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2744;--navy2:#1a3a5c;--navy3:#2563a8;
  --green:#059669;--gbg:#d1fae5;--gtxt:#065f46;
  --blue:#2563eb;--bbg:#dbeafe;--btxt:#1e40af;
  --amber:#d97706;--abg:#fef3c7;--atxt:#92400e;
  --red:#dc2626;--rbg:#fee2e2;--rtxt:#991b1b;
  --gray:#64748b;--gbg2:#f1f5f9;--gtxt2:#334155;
  --border:#e2e8f0;--surf:#f8fafc;
  --text:#0f172a;--text2:#475569;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --shlg:0 8px 40px rgba(15,39,68,.18);
  --r:12px;
}
body{font-family:'IBM Plex Sans TC',sans-serif;background:var(--gbg2);color:var(--text);font-size:14px;min-height:100vh}

#loading{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:14px;z-index:300;transition:opacity .4s}
.spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.overlay{position:fixed;inset:0;background:rgba(15,39,68,.5);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .18s;padding:16px;overflow-y:auto}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal{background:#fff;border-radius:20px;padding:32px 28px;width:500px;max-width:100%;box-shadow:var(--shlg);animation:slideUp .2s;max-height:90vh;overflow-y:auto}
.modal-icon{font-size:22px;margin-bottom:10px}
.modal h2{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:4px}
.modal p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.modal a{color:var(--navy3)}

.field{margin-bottom:11px}
.lbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:4px}
.inp{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s;background:#fff}
.inp:focus{border-color:var(--navy3)}
textarea.inp{resize:vertical;min-height:76px}
select.inp{cursor:pointer}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 18px;border-radius:9px;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.86}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;width:100%;padding:11px;font-size:14px}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy3);opacity:1}
.btn-ghost{background:var(--gbg2);color:var(--text2)}
.btn-danger{background:var(--rbg);color:var(--rtxt)}
.btn-amber{background:var(--abg);color:var(--atxt)}
.btn-sm{padding:4px 11px;font-size:12px}
.btn-icon{padding:5px 8px;font-size:13px;border-radius:7px}

/* RAG */
.rag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:700}
.rag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rag-green{background:#d1fae5;color:#065f46}.rag-green .rag-dot{background:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.2)}
.rag-amber{background:#fef3c7;color:#92400e}.rag-amber .rag-dot{background:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.2)}
.rag-red  {background:#fee2e2;color:#991b1b}.rag-red   .rag-dot{background:#ef4444;box-shadow:0 0 0 2px rgba(239,68,68,.2)}
.rag-gray {background:#f1f5f9;color:#475569}.rag-gray  .rag-dot{background:#94a3b8}

/* header */
.header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff}
.hdr{max-width:1060px;margin:0 auto;padding:18px 24px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding-bottom:12px}
.hdr-title{font-size:17px;font-weight:700}
.hdr-sub{font-size:12px;opacity:.7;margin-top:3px}
.stat-pct{font-size:26px;font-weight:700;font-family:'IBM Plex Mono';line-height:1}
.stat-lbl{font-size:11px;opacity:.65;margin-top:2px;text-align:right}
.prog-wrap{background:rgba(255,255,255,.15);border-radius:100px;height:5px;overflow:hidden;margin-bottom:12px}
.prog-fill{height:5px;background:linear-gradient(90deg,#34d399,#10b981);border-radius:100px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.sync-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border-radius:100px;padding:3px 10px;font-size:11px;margin-bottom:10px}
.sdot{width:6px;height:6px;background:#34d399;border-radius:50%;animation:pulse 2s infinite}
.sdot.err{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);transition:all .15s}
.nav-tab.active{background:#fff;color:var(--navy)}

.content{max-width:1060px;margin:0 auto;padding:20px 24px}

.sum-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sum-card{background:#fff;border-radius:var(--r);padding:12px 15px;box-shadow:var(--sh);border-top:3px solid transparent}
.sum-num{font-size:21px;font-weight:700;font-family:'IBM Plex Mono'}
.sum-lbl{font-size:11px;color:var(--text2);margin-top:2px}

.rag-legend{display:flex;gap:10px;align-items:center;background:#fff;border-radius:9px;padding:8px 14px;box-shadow:var(--sh);margin-bottom:12px;flex-wrap:wrap}
.rag-legend-lbl{font-size:11px;color:var(--text2);font-weight:600}

.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.tl,.tr{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fbtn{padding:5px 12px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;color:var(--text2)}
.fbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.srch{padding:6px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;outline:none;width:160px;color:var(--text);transition:border-color .15s}
.srch:focus{border-color:var(--navy3)}

.tasks-list{display:flex;flex-direction:column;gap:10px}
.task-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1.5px solid transparent;transition:box-shadow .15s,opacity .15s;position:relative}
.task-card:hover{box-shadow:0 4px 20px rgba(15,39,68,.1)}
.task-card.overdue{border-color:#fca5a5}
.task-card.dragging{opacity:.35;box-shadow:none}
.task-card.drag-over{box-shadow:0 0 0 2px var(--navy3),0 4px 20px rgba(37,99,168,.18)}
.drag-hint{font-size:12px;color:#94a3b8;text-align:center;margin-top:8px}

.task-head{padding:14px 16px 14px 4px;cursor:pointer;user-select:none;display:flex;align-items:flex-start}
.drag-handle{width:26px;display:flex;align-items:center;justify-content:center;cursor:grab;color:#cbd5e1;font-size:13px;flex-shrink:0;padding:2px 0;user-select:none}
.drag-handle:hover{color:var(--gray)}
.drag-handle:active{cursor:grabbing}
.th-inner{flex:1;min-width:0}
.th-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.th-left{flex:1;min-width:0}
.ttl{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.4}
.tmeta{display:flex;gap:12px;margin-top:5px;flex-wrap:wrap}
.tm{font-size:12px;color:var(--text2)}
.tm.red{color:var(--red)}
.th-actions{display:flex;gap:5px;flex-shrink:0;align-items:center}
.exp-icon{font-size:10px;color:var(--text2);transition:transform .2s}
.exp-icon.open{transform:rotate(180deg)}
.mbar{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.mpill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:500;border:1.5px solid transparent}
.mp-done  {background:var(--gbg);color:var(--gtxt);border-color:#a7f3d0}
.mp-prog  {background:var(--bbg);color:var(--btxt);border-color:#bfdbfe}
.mp-review{background:var(--abg);color:var(--atxt);border-color:#fde68a}
.mp-late  {background:var(--rbg);color:var(--rtxt);border-color:#fecdd3}
.mp-none  {background:var(--gbg2);color:var(--gray);border-color:var(--border)}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.task-body{border-top:1px solid var(--gbg2);overflow:hidden;border-radius:0 0 var(--r) var(--r)}
.mr{display:flex;align-items:stretch;border-bottom:1px solid var(--gbg2)}
.mr:last-child{border-bottom:none}
.mr-l{width:185px;flex-shrink:0;padding:12px 16px;border-right:1px solid var(--gbg2);display:flex;flex-direction:column;gap:4px}
.mr-name{font-size:13px;font-weight:600}
.mr-m{flex:1;padding:12px 16px;min-width:0}
.mr-r{padding:12px 12px;display:flex;align-items:flex-start;flex-shrink:0}
.log-list{display:flex;flex-direction:column;gap:5px}
.log-e{background:var(--surf);border-left:3px solid var(--border);border-radius:0 6px 6px 0;padding:7px 10px;font-size:12px;color:var(--text2);line-height:1.5}
.log-e .lm{font-size:10px;color:var(--gray);margin-bottom:2px}
.log-e.latest{border-left-color:var(--navy3)}
.no-log{font-size:12px;color:#94a3b8;font-style:italic;padding:4px 0}
.ied{background:var(--surf);border-top:1px solid var(--border);padding:14px 18px;animation:slideUp .15s}
.ied-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ied-f{margin-top:9px}
.ied-a{display:flex;gap:7px;margin-top:10px}

.task-form{background:#fff;border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh);border:1.5px solid var(--navy3);animation:slideUp .2s}
.task-form h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px}
.form-2{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.mtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;min-height:28px;align-items:center}
.mtag{display:inline-flex;align-items:center;gap:5px;background:var(--bbg);color:var(--btxt);border-radius:100px;padding:3px 11px;font-size:12px;font-weight:500}
.mtag button{background:none;border:none;cursor:pointer;color:var(--btxt);font-size:14px;line-height:1;padding:0;opacity:.6}
.mtag button:hover{opacity:1}
.madd{display:flex;gap:7px;margin-top:7px}
.madd .inp{flex:1}
.form-actions{display:flex;gap:7px;margin-top:12px}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.bg-g {background:var(--gbg);color:var(--gtxt)}
.bg-b {background:var(--bbg);color:var(--btxt)}
.bg-a {background:var(--abg);color:var(--atxt)}
.bg-r {background:var(--rbg);color:var(--rtxt)}
.bg-gr{background:var(--gbg2);color:var(--gtxt2)}

.empty{text-align:center;padding:52px 24px;background:#fff;border-radius:var(--r);color:var(--text2)}

/* calendar */
.cal-wrap{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.cal-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-title{font-size:15px;font-weight:700;color:var(--navy);min-width:160px;text-align:center}
.cal-vt{display:flex;gap:4px}
.cvt{padding:4px 13px;border-radius:7px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--text2);transition:all .15s}
.cvt.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.cal-body{padding:16px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow-lbl{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{min-height:82px;border-radius:8px;padding:5px 6px;border:1.5px solid transparent;cursor:pointer;transition:background .15s}
.cal-cell:hover{background:var(--surf)}
.cal-cell.today{border-color:var(--navy3);background:#eff6ff}
.cal-cell.other-month .cal-day{opacity:.3}
.cal-cell.other-month .cal-events{opacity:.4}
.cal-day{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.today-num{background:var(--navy);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.cal-events{display:flex;flex-direction:column;gap:2px}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;display:flex;align-items:center;gap:3px}
.cal-ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-more{font-size:10px;color:var(--gray);margin-top:1px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-col{border-radius:10px;border:1.5px solid var(--border);overflow:hidden}
.week-col.today{border-color:var(--navy3)}
.week-col-head{padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);background:var(--surf)}
.week-dow{font-size:11px;color:var(--text2);font-weight:600}
.week-day{font-size:18px;font-weight:700;color:var(--navy)}
.week-col.today .week-day{color:var(--blue)}
.week-col-body{padding:7px;display:flex;flex-direction:column;gap:4px;min-height:110px}
.week-ev{font-size:11px;padding:4px 7px;border-radius:6px;font-weight:500;line-height:1.4;display:flex;align-items:center;gap:4px}
.week-ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.yr-month{border-radius:10px;border:1.5px solid var(--border);overflow:hidden}
.yr-month-head{padding:7px 10px;background:var(--gbg2);font-size:12px;font-weight:700;color:var(--navy);text-align:center;border-bottom:1px solid var(--border)}
.yr-dow{display:grid;grid-template-columns:repeat(7,1fr)}
.yr-dow-lbl{text-align:center;font-size:9px;color:var(--text2);padding:2px 0}
.yr-grid-inner{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:3px}
.yr-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:3px;cursor:pointer;transition:background .1s;color:var(--text2);position:relative}
.yr-cell:hover{background:var(--gbg2)}
.yr-cell.today{background:var(--navy);color:#fff;font-weight:700}
.yr-cell.has-tasks::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--amber)}
.yr-cell.other-m{opacity:.2}

.day-popup{position:fixed;inset:0;background:rgba(15,39,68,.45);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.day-popup-inner{background:#fff;border-radius:16px;padding:22px;width:420px;max-width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shlg);animation:slideUp .2s}
.day-task-item{border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.day-task-title{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.day-task-m{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2);padding:3px 0}

.user-panel{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px 22px}
.user-panel h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px}
.user-search-row{display:flex;gap:10px;margin-bottom:16px}
.user-search-row .inp{flex:1}
.user-stat-card{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.usc-head{background:var(--gbg2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.usc-name{font-size:14px;font-weight:700}
.usc-body{padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.usc-task{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:6px 10px;background:var(--surf);border-radius:8px;gap:8px}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--navy);color:#fff;padding:8px 20px;border-radius:100px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none;z-index:400;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:700px){
  .sum-strip{grid-template-columns:repeat(2,1fr)}
  .mr-l{width:120px;padding:10px}
  .form-2{grid-template-columns:1fr}
  .ied-g{grid-template-columns:1fr}
  .year-grid{grid-template-columns:repeat(2,1fr)}
  .week-grid{grid-template-columns:repeat(4,1fr)}
  .rag-legend{display:none}
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div style="font-size:13px;opacity:.65">載入中…</div></div>
<div id="toast"></div>
<div id="app" style="display:none"></div>

<script>
/* ══ CONFIG ══ */
const GIST_ID='8a2ffecb915c95aae1019c8af1d8b929',GIST_FILE='data.json',TOKEN_KEY='ppt_gh_token',SYNC_MS=5000;

const ST={
  not_started:   {lbl:'未開始',  pcls:'mp-none',  bdg:'bg-gr'},
  in_progress:   {lbl:'進行中',  pcls:'mp-prog',  bdg:'bg-b'},
  pending_review:{lbl:'待審核',  pcls:'mp-review',bdg:'bg-a'},
  completed:     {lbl:'已完成',  pcls:'mp-done',  bdg:'bg-g'},
  delayed:       {lbl:'進度落後',pcls:'mp-late',  bdg:'bg-r'},
};
const DOW=['日','一','二','三','四','五','六'];
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

/* ── RAG ── */
function calcRag(task){
  if(task.members.every(m=>task.submissions[m]?.status==='completed')) return 'green';
  const now=new Date(), dl=task.deadline?new Date(task.deadline):null;
  if(dl&&dl<now)                              return 'red';
  if(task.members.some(m=>task.submissions[m]?.status==='delayed'))    return 'red';
  const soon=dl&&(dl-now)<3*86400000;
  const halfNone=task.members.filter(m=>!task.submissions[m]||task.submissions[m].status==='not_started').length > task.members.length/2;
  if(soon||halfNone)                          return 'amber';
  if(task.members.some(m=>task.submissions[m]&&task.submissions[m].status!=='not_started')) return 'green';
  return 'gray';
}
function ragBadge(task){
  const r=calcRag(task);
  const map={green:{cls:'rag-green',dot:'#059669',lbl:'進度正常'},amber:{cls:'rag-amber',dot:'#f59e0b',lbl:'需注意'},red:{cls:'rag-red',dot:'#ef4444',lbl:'風險'},gray:{cls:'rag-gray',dot:'#94a3b8',lbl:'未開始'}};
  const m=map[r];
  return`<span class="rag ${m.cls}"><span class="rag-dot" style="background:${m.dot}"></span>${m.lbl}</span>`;
}
function ragColor(task){
  const r=calcRag(task);
  return{green:{dot:'#059669',bg:'#d1fae5',txt:'#065f46'},amber:{dot:'#f59e0b',bg:'#fef3c7',txt:'#92400e'},red:{dot:'#ef4444',bg:'#fee2e2',txt:'#991b1b'},gray:{dot:'#94a3b8',bg:'#f1f5f9',txt:'#475569'}}[r];
}

/* ══ GIST ══ */
async function gistGet(){
  const h={Authorization:`token ${S.token}`,Accept:'application/vnd.github.v3+json'};
  if(S.lastEtag)h['If-None-Match']=S.lastEtag;
  const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:h});
  if(r.status===304)return null;
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  S.lastEtag=r.headers.get('ETag')||'';
  const g=await r.json();
  return JSON.parse(g.files?.[GIST_FILE]?.content||'{"tasks":[]}');
}
async function gistSet(data){
  const r=await fetch(`https://api.github.com/gists/${GIST_ID}`,{method:'PATCH',headers:{Authorization:`token ${S.token}`,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(data,null,2)}}})});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  S.lastEtag='';
}

async function init(){
  S.token=localStorage.getItem(TOKEN_KEY)||'';
  if(!S.token){S.screen='setup';hideLoading();render();return;}
  try{
    const d=await gistGet();
    S.tasks=(!d||!d.tasks?.length)?SAMPLE:d.tasks;
    if(!d||!d.tasks?.length)await gistSet({tasks:S.tasks});
    S.syncTime=new Date();S.screen='login';
  }catch{localStorage.removeItem(TOKEN_KEY);S.token='';S.screen='setup';}
  hideLoading();render();startSync();
}
function hideLoading(){
  const el=document.getElementById('loading');el.style.opacity='0';
  setTimeout(()=>{el.style.display='none';document.getElementById('app').style.display='';},400);
}
let syncTimer=null;
function startSync(){
  clearInterval(syncTimer);
  syncTimer=setInterval(async()=>{
    if(S.screen!=='main'||S.editKey||S.saving)return;
    try{const d=await gistGet();if(d&&JSON.stringify(d.tasks)!==JSON.stringify(S.tasks)){S.tasks=d.tasks;render();}S.syncTime=new Date();S.syncError=false;updSync();}
    catch{S.syncError=true;updSync();}
  },SYNC_MS);
}
function updSync(){
  const el=document.getElementById('syncPill');if(!el)return;
  const t=S.syncTime?S.syncTime.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
  el.innerHTML=S.syncError?`<span class="sdot err"></span> 同步失敗`:`<span class="sdot"></span> 同步中 · 上次 ${t}`;
}
async function saveData(){
  S.saving=true;
  try{await gistSet({tasks:S.tasks});S.syncTime=new Date();S.syncError=false;S.lastEtag='';}
  catch{toast('❌ 儲存失敗');}
  S.saving=false;
}

/* helpers */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function isOver(d){return d&&new Date(d)<new Date();}
function isSoon(d){if(!d)return false;const v=new Date(d)-new Date();return v>0&&v<3*86400000;}
function fmtTs(iso){if(!iso)return '';const d=new Date(iso);return d.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})+' '+d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
function taskAllDone(t){return t.members.every(m=>t.submissions[m]?.status==='completed');}
function taskPending(t){return t.members.filter(m=>t.submissions[m]?.status!=='completed').length;}
function isMine(t){return t.members.includes(S.userName);}
function myStatus(t){return t.submissions[S.userName]?.status||null;}
function tasksOnDate(ds){return S.tasks.filter(t=>t.deadline===ds);}
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function allMembers(){const s=new Set();S.tasks.forEach(t=>t.members.forEach(m=>s.add(m)));return[...s].sort();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

function rTask(task){

  const sn=isSoon(task.deadline);
  const pending=taskPending(task);
  const done=task.members.length-pending;
  const ms=myStatus(task);
  const dotMap={'mp-done':'#059669','mp-prog':'#2563eb','mp-review':'#d97706','mp-late':'#dc2626','mp-none':'#94a3b8'};
  const pills=task.members.map(m=>{
    const sub=task.submissions[m]||{status:'not_started'};
    const st=ST[sub.status]||ST.not_started;
    return`<span class="mpill ${st.pcls}"><span class="pdot" style="background:${dotMap[st.pcls]}"></span>${esc(m)}</span>`;
  }).join('');
  return`<div class="task-card ${od?'overdue':''}" data-taskid="${task.id}" draggable="true">
  <div class="task-head" id="hd_${task.id}">
    <div class="drag-handle" title="拖曳排序">☰</div>

            ${od?`<span class="badge bg-r">⚠ 已逾期</span>`:''}
            ${sn?`<span class="badge bg-a">⏰ 即將到期</span>`:''}
            ${isMine(task)&&ms?`<span class="badge ${ST[ms].bdg}">我：${ST[ms].lbl}</span>`:''}
          </div>
          <div class="tmeta">
            <span class="tm">👥 ${task.members.length} 位成員 · 已繳 ${done}</span>
            ${task.deadline?`<span class="tm ${od?'red':''}">📅 截止 ${task.deadline}</span>`:''}
          </div>
          <div class="mbar">${pills}</div>
        </div>
        <div class="th-actions">
          <button class="btn btn-amber btn-icon" id="editTaskBtn_${task.id}" title="編輯任務">✏️</button>
          <button class="btn btn-danger btn-icon" id="delTaskBtn_${task.id}" title="刪除任務">🗑</button>
          <span class="exp-icon ${exp?'open':''}">▼</span>

  ${exp?`<div class="task-body">${task.members.map(m=>rMemberRow(task,m)).join('')}</div>`:''}

      <button class="cvt ${S.calView==='year'?'active':''}"  data-cv="year">年</button>
      <button class="cvt ${S.calView==='month'?'active':''}" data-cv="month">月</button>
      <button class="cvt ${S.calView==='week'?'active':''}"  data-cv="week">週</button>
    </div>
  </div>
  <div class="cal-body">${body}</div>
</div>`;
}

function rCalMonth(y,m){
  const today=new Date(),firstDay=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),diPrev=new Date(y,m,0).getDate();
  let cells='';
  for(let i=firstDay-1;i>=0;i--)cells+=rCalCell(y,m-1,diPrev-i,true,today);
  for(let d=1;d<=dim;d++)cells+=rCalCell(y,m,d,false,today);
  const next=(7-(firstDay+dim)%7)%7;
  for(let d=1;d<=next;d++)cells+=rCalCell(y,m+1,d,true,today);
  return`<div class="cal-dow">${DOW.map(d=>`<div class="cal-dow-lbl">${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div>`;
}

function rCalCell(y,m,day,other,today){
  const ds=dStr(y,m,day),isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===day;
  const tasks=tasksOnDate(ds);
  const evs=tasks.slice(0,3).map(t=>{const c=ragColor(t);return`<div class="cal-ev" style="background:${c.bg};color:${c.txt}" data-dayClick="${ds}"><span class="cal-ev-dot" style="background:${c.dot}"></span>${esc(t.title)}</div>`;}).join('');
  const more=tasks.length>3?`<div class="cal-more" data-dayClick="${ds}">+${tasks.length-3} 更多</div>`:'';
  const dayLbl=isToday?`<span class="today-num">${day}</span>`:day;
  return`<div class="cal-cell ${isToday?'today':''} ${other?'other-month':''}" data-dayClick="${ds}"><div class="cal-day">${dayLbl}</div><div class="cal-events">${evs}${more}</div></div>`;
}

function rCalWeek(date){
  const dow=date.getDay(),mon=new Date(date);mon.setDate(date.getDate()-dow+1);
  const today=new Date();
  return`<div class="week-grid">${Array.from({length:7},(_,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isT=d.toDateString()===today.toDateString();
    const evs=tasksOnDate(ds).map(t=>{const c=ragColor(t);return`<div class="week-ev" style="background:${c.bg};color:${c.txt}" data-dayClick="${ds}"><span class="week-ev-dot" style="background:${c.dot}"></span>${esc(t.title)}</div>`;}).join('');
    return`<div class="week-col ${isT?'today':''}"><div class="week-col-head"><div class="week-dow">${DOW[d.getDay()]}</div><div class="week-day">${d.getDate()}</div></div><div class="week-col-body">${evs}</div></div>`;
  }).join('')}</div>`;
}

function rCalYear(y){
  const today=new Date();
  return`<div class="year-grid">${Array.from({length:12},(_,mi)=>{
    const fd=new Date(y,mi,1).getDay(),dim=new Date(y,mi+1,0).getDate();
    let c='';for(let i=0;i<fd;i++)c+=`<div class="yr-cell other-m"></div>`;
    for(let d=1;d<=dim;d++){const ds=dStr(y,mi,d);const isT=today.getFullYear()===y&&today.getMonth()===mi&&today.getDate()===d;const ht=tasksOnDate(ds).length>0;c+=`<div class="yr-cell ${isT?'today':''} ${ht?'has-tasks':''}" data-dayClick="${ds}">${d}</div>`;}
    return`<div class="yr-month"><div class="yr-month-head">${MONTHS[mi]}</div><div class="yr-dow">${DOW.map(d=>`<div class="yr-dow-lbl">${d}</div>`).join('')}</div><div class="yr-grid-inner">${c}</div></div>`;
  }).join('')}</div>`;
}

function rDayPopup(ds){
  const tasks=tasksOnDate(ds),dateObj=new Date(ds);
  const items=tasks.length?tasks.map(t=>{
    const mRows=t.members.map(m=>{const sub=t.submissions[m]||{status:'not_started'};const st=ST[sub.status]||ST.not_started;return`<div class="day-task-m"><span>${esc(m)}</span><span class="badge ${st.bdg}">${st.lbl}</span></div>`;}).join('');
    return`<div class="day-task-item"><div class="day-task-title">${ragBadge(t)} ${esc(t.title)}</div><div>${mRows}</div></div>`;
  }).join(''):`<div style="font-size:13px;color:#94a3b8;text-align:center;padding:20px">這天沒有截止任務</div>`;
  return`<div class="day-popup" id="dayPopup"><div class="day-popup-inner">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:15px;font-weight:700;color:var(--navy)">📅 ${dateObj.getMonth()+1}月${dateObj.getDate()}日 截止任務</div>
    <button class="btn btn-ghost btn-sm" id="closeDayPopup">✕</button>
  </div>${items}
</div></div>`;
}

/* ── USERS TAB ── */
function rUsersTab(){
  const members=allMembers(),q=S.userSearch.trim();
  const show=q?members.filter(m=>m.includes(q)):members;
  const cards=show.length?show.map(member=>{
    const myTasks=S.tasks.filter(t=>t.members.includes(member));
    const pending=myTasks.filter(t=>t.submissions[member]?.status!=='completed').length;
    const done=myTasks.filter(t=>t.submissions[member]?.status==='completed').length;
    const rows=q?myTasks.map(t=>{const sub=t.submissions[member]||{status:'not_started'};const st=ST[sub.status]||ST.not_started;return`<div class="usc-task"><span>${esc(t.title)}${t.deadline?` <span style="font-size:11px;color:#94a3b8">· 截止 ${t.deadline}</span>`:''}</span><span class="badge ${st.bdg}">${st.lbl}</span></div>`;}).join(''):'';
    return`<div class="user-stat-card"><div class="usc-head"><div class="usc-name">👤 ${esc(member)}</div><div style="display:flex;gap:7px;flex-wrap:wrap"><span class="badge bg-r">未完成 ${pending}</span><span class="badge bg-g">已完成 ${done}</span><span class="badge bg-gr">共 ${myTasks.length} 項</span></div></div>${rows?`<div class="usc-body">${rows}</div>`:''}</div>`;
  }).join(''):`<div style="font-size:13px;color:#94a3b8;text-align:center;padding:24px">找不到符合的成員</div>`;
  return`<div class="user-panel"><h3>成員進度查詢</h3>
  <div class="user-search-row"><input class="inp" id="userSearchIn" placeholder="輸入成員姓名搜尋…" value="${esc(S.userSearch)}"/>${S.userSearch?`<button class="btn btn-ghost btn-sm" id="clearUserSearch">清除</button>`:''}</div>
  <div>${cards}</div>
</div>`;
}

/* ══ BIND ══ */
function bind(){
  const $=id=>document.getElementById(id);

  // setup
  const tI=$('tokIn');
  if(tI){tI.addEventListener('input',e=>{$('saveTokenBtn').disabled=!e.target.value.trim();});tI.addEventListener('keydown',e=>{if(e.key==='Enter'&&tI.value.trim())doSaveToken();});$('saveTokenBtn').addEventListener('click',doSaveToken);}

  // login
  const nI=$('nameIn');
  if(nI){nI.addEventListener('input',e=>{S.nameInput=e.target.value;$('loginBtn').disabled=!e.target.value.trim();});nI.addEventListener('keydown',e=>{if(e.key==='Enter'&&S.nameInput?.trim())doLogin();});$('loginBtn').addEventListener('click',doLogin);$('resetTokBtn').addEventListener('click',()=>{localStorage.removeItem(TOKEN_KEY);S.token='';S.screen='setup';render();});}

  // tabs
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));

  // tasks toolbar
  const tA=$('toggleAddBtn');if(tA)tA.addEventListener('click',()=>{S.showAdd=!S.showAdd;S.newTask={title:'',deadline:''};S.newMembers=[];S.memberInput='';render();});
  const cA=$('cancelAddBtn');if(cA)cA.addEventListener('click',()=>{S.showAdd=false;render();});
  const sU=$('switchUserBtn');if(sU)sU.addEventListener('click',()=>{S.screen='login';S.editKey=null;S.showAdd=false;render();});
  const sI=$('searchIn');if(sI)sI.addEventListener('input',e=>{S.search=e.target.value;render();});
  document.querySelectorAll('[data-f]').forEach(b=>b.addEventListener('click',()=>{S.filter=b.dataset.f;render();}));

  // add form
  const nT=$('nTitle'),nD=$('nDeadline'),mI=$('memberIn');
  if(nT)nT.addEventListener('input',e=>S.newTask.title=e.target.value);
  if(nD)nD.addEventListener('change',e=>S.newTask.deadline=e.target.value);
  if(mI){mI.addEventListener('input',e=>S.memberInput=e.target.value);mI.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addMember();}});$('addMemberBtn').addEventListener('click',addMember);}
  document.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{S.newMembers=S.newMembers.filter(m=>m!==b.dataset.rm);render();}));
  const dA=$('doAddTaskBtn');if(dA)dA.addEventListener('click',addTask);

  // task card heads (expand/collapse)
  S.tasks.forEach(task=>{
    const h=$(`hd_${task.id}`);
    if(h)h.addEventListener('click',e=>{
      if(e.target.closest('.drag-handle')||e.target.id===`editTaskBtn_${task.id}`||e.target.id===`delTaskBtn_${task.id}`||e.target.closest('[data-edit]'))return;
      S.expanded.has(task.id)?S.expanded.delete(task.id):S.expanded.add(task.id);render();
    });

    // edit task button — open modal
    const eBtn=$(`editTaskBtn_${task.id}`);
    if(eBtn)eBtn.addEventListener('click',e=>{
      e.stopPropagation();
      S.editTaskId=task.id;
      S.editTaskMembers=[...task.members];
      S.editTaskMemberInput='';
      render();
    });

    // delete task button
    const dBtn=$(`delTaskBtn_${task.id}`);
    if(dBtn)dBtn.addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm(`確定要刪除「${task.title}」嗎？`)){
        S.tasks=S.tasks.filter(x=>x.id!==task.id);S.expanded.delete(task.id);
        saveData();render();toast('已刪除任務');
      }
    });
  });

  // member edit
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const key=b.dataset.edit;
    if(S.editKey===key){S.editKey=null;S.editData={};}
    else{const[tid,member]=key.split('|');const sub=S.tasks.find(t=>t.id===tid)?.submissions[member]||{};S.editKey=key;S.editData={status:sub.status||'not_started',content:'',date:new Date().toISOString().split('T')[0]};}
    render();
  }));
  const eS=$('eStatus'),eD=$('eDate'),eC=$('eContent');
  if(eS)eS.addEventListener('change',e=>S.editData.status=e.target.value);
  if(eD)eD.addEventListener('change',e=>S.editData.date=e.target.value);
  if(eC)eC.addEventListener('input',e=>S.editData.content=e.target.value);
  const sv=$('saveEditBtn');if(sv)sv.addEventListener('click',doSaveEdit);
  const cv=$('cancelEditBtn');if(cv)cv.addEventListener('click',()=>{S.editKey=null;S.editData={};render();});

  // ── EDIT TASK MODAL ──
  // Members list changes trigger render; title/deadline are read from DOM on save only
  document.querySelectorAll('.rmEditMember').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    S.editTaskMembers=S.editTaskMembers.filter(m=>m!==b.dataset.m);render();
  }));
  const etM=$('etMemberIn');
  if(etM){
    etM.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addMemberToEdit();}});
    $('etAddBtn').addEventListener('click',addMemberToEdit);
  }
  const setBtn=$('saveEditTaskBtn');if(setBtn)setBtn.addEventListener('click',doSaveEditTask);
  const cetBtn=$('cancelEditTaskBtn');if(cetBtn)cetBtn.addEventListener('click',()=>{S.editTaskId=null;render();});
  const etOv=$('editOverlay');if(etOv)etOv.addEventListener('click',e=>{if(e.target===etOv){S.editTaskId=null;render();}});

  // calendar
  const cp=$('calPrev'),cn=$('calNext'),ct=$('calToday');
  if(cp)cp.addEventListener('click',()=>calNav(-1));
  if(cn)cn.addEventListener('click',()=>calNav(1));
  if(ct)ct.addEventListener('click',()=>{S.calDate=new Date();render();});
  document.querySelectorAll('[data-cv]').forEach(b=>b.addEventListener('click',()=>{S.calView=b.dataset.cv;render();}));
  document.querySelectorAll('[data-dayClick]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.dayPopup=el.dataset.dayClick;render();}));
  const cdp=$('closeDayPopup');if(cdp)cdp.addEventListener('click',()=>{S.dayPopup=null;render();});
  const dpEl=$('dayPopup');if(dpEl)dpEl.addEventListener('click',e=>{if(e.target===dpEl){S.dayPopup=null;render();}});

  // users
  const usI=$('userSearchIn');if(usI){usI.addEventListener('input',e=>{S.userSearch=e.target.value;render();});}
  const cuS=$('clearUserSearch');if(cuS)cuS.addEventListener('click',()=>{S.userSearch='';render();});

  // drag & drop
  bindDrag();
}

/* ── DRAG ── */
function bindDrag(){
  document.querySelectorAll('.task-card[data-taskid]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      S.dragSrcId=card.dataset.taskid;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      if(card.dataset.taskid!==S.dragSrcId){document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));card.classList.add('drag-over');}
    });
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      const toId=card.dataset.taskid;if(!S.dragSrcId||S.dragSrcId===toId)return;
      const fi=S.tasks.findIndex(t=>t.id===S.dragSrcId),ti=S.tasks.findIndex(t=>t.id===toId);
      if(fi<0||ti<0)return;
      const arr=[...S.tasks];const[item]=arr.splice(fi,1);arr.splice(ti,0,item);
      S.tasks=arr;S.dragSrcId=null;saveData();render();toast('✅ 順序已更新');
    });
  });
}

function calNav(dir){
  const d=new Date(S.calDate);
  if(S.calView==='year')d.setFullYear(d.getFullYear()+dir);
  else if(S.calView==='month')d.setMonth(d.getMonth()+dir);
  else d.setDate(d.getDate()+dir*7);
  S.calDate=d;render();
}

/* ══ ACTIONS ══ */
async function doSaveToken(){
  const val=document.getElementById('tokIn')?.value?.trim();if(!val)return;
  S.token=val;localStorage.setItem(TOKEN_KEY,val);
  const btn=document.getElementById('saveTokenBtn');if(btn){btn.disabled=true;btn.textContent='驗證中…';}
  try{
    const d=await gistGet();
    S.tasks=(!d||!d.tasks?.length)?SAMPLE:d.tasks;
    if(!d||!d.tasks?.length)await gistSet({tasks:S.tasks});
    S.syncTime=new Date();S.screen='login';render();startSync();toast('✅ Token 驗證成功！');
  }catch(e){
    localStorage.removeItem(TOKEN_KEY);S.token='';
    if(btn){btn.disabled=false;btn.textContent='儲存並進入系統';}
    alert('❌ Token 無效或無法存取 Gist。\n\n錯誤：'+e.message);
  }
}

function doLogin(){
  const n=(document.getElementById('nameIn')?.value||S.nameInput||'').trim();if(!n)return;
  S.userName=n;S.nameInput=n;S.screen='main';render();
}

function addMember(){
  const m=S.memberInput.trim();if(!m)return;
  if(S.newMembers.includes(m)){toast('已新增過此成員');return;}
  S.newMembers.push(m);S.memberInput='';render();
}

function addMemberToEdit(){
  const etM=document.getElementById('etMemberIn');
  const m=(etM?.value||'').trim();if(!m)return;
  if(S.editTaskMembers.includes(m)){toast('已新增過此成員');return;}
  S.editTaskMembers.push(m);
  if(etM)etM.value='';
  // re-render just the member tags area without full render
  const tagsEl=document.querySelector('#editOverlay .mtags');
  if(tagsEl){
    tagsEl.innerHTML=S.editTaskMembers.map(mm=>`<span class="mtag">${esc(mm)}<button class="rmEditMember" data-m="${esc(mm)}">×</button></span>`).join('');
    tagsEl.querySelectorAll('.rmEditMember').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();S.editTaskMembers=S.editTaskMembers.filter(x=>x!==b.dataset.m);const tagsEl2=document.querySelector('#editOverlay .mtags');if(tagsEl2){tagsEl2.innerHTML=S.editTaskMembers.map(mm=>`<span class="mtag">${esc(mm)}<button class="rmEditMember" data-m="${esc(mm)}">×</button></span>`).join('');tagsEl2.querySelectorAll('.rmEditMember').forEach(b2=>b2.addEventListener('click',arguments.callee));}}));
  }
}

async function addTask(){
  if(!S.newTask.title.trim()){toast('請輸入任務名稱');return;}
  if(!S.newMembers.length){toast('請至少新增一位成員');return;}
  const subs={};S.newMembers.forEach(m=>{subs[m]={status:'not_started',updatedAt:'',log:[]};});
  const t={id:uid(),title:S.newTask.title.trim(),deadline:S.newTask.deadline,members:[...S.newMembers],submissions:subs,createdAt:new Date().toISOString()};
  S.tasks.push(t);S.showAdd=false;S.newTask={title:'',deadline:''};S.newMembers=[];S.memberInput='';
  S.expanded.add(t.id);await saveData();render();toast('✅ 已新增任務');
}

async function doSaveEditTask(){
  /* Read title and deadline directly from DOM – avoids stale state issue */
  const titleEl=document.getElementById('etTitle');
  const deadlineEl=document.getElementById('etDeadline');
  const newTitle=(titleEl?.value||'').trim();
  const newDeadline=deadlineEl?.value||'';
  if(!newTitle){toast('請輸入任務名稱');return;}
  if(!S.editTaskMembers.length){toast('請至少保留一位成員');return;}
  const task=S.tasks.find(t=>t.id===S.editTaskId);
  if(!task)return;
  const newSubs={};
  S.editTaskMembers.forEach(m=>{newSubs[m]=task.submissions[m]||{status:'not_started',updatedAt:'',log:[]};});
  S.tasks=S.tasks.map(t=>t.id!==S.editTaskId?t:{...t,title:newTitle,deadline:newDeadline,members:[...S.editTaskMembers],submissions:newSubs});
  S.editTaskId=null;
  await saveData();render();toast('✅ 任務已更新');
}

async function doSaveEdit(){
  const eS=document.getElementById('eStatus'),eD=document.getElementById('eDate'),eC=document.getElementById('eContent');
  if(eS)S.editData.status=eS.value;if(eD)S.editData.date=eD.value;if(eC)S.editData.content=eC.value;
  const content=(S.editData.content||'').trim();if(!content){toast('請填寫本次更新內容');return;}
  const[tid,member]=S.editKey.split('|');
  S.tasks=S.tasks.map(task=>{
    if(task.id!==tid)return task;
    const ex=task.submissions[member]||{log:[]};
    return{...task,submissions:{...task.submissions,[member]:{status:S.editData.status,updatedAt:new Date().toISOString(),log:[...(ex.log||[]),{content,at:new Date().toISOString()}]}}};
  });
  S.editKey=null;S.editData={};await saveData();render();toast('✅ 已儲存更新');
}

init();
</script>
